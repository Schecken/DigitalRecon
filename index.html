<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Digital Recon</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
</head>
<body>
    <div id="map"></div>
    <div id="map-controls">
        <button id="map-view-toggle" type="button">Switch to Flat Map</button>
    </div>
    <div id="sidebar" class="sidebar">
        <button class="close-btn" onclick="closeSidebar()">×</button>
        <h1 id="country-name"></h1>
        <p id="country-info"></p>
        <p id="runtime-warning" class="runtime-warning" hidden></p>

        <div id="timeframe-buttons"></div>

        <div id="radar-embed">
            <div class="radar-embed-grid">
                <iframe
                    id="mobile-desktop-iframe"
                    class="cf-radar-embed"
                    width="800"
                    height="447"
                    src=""
                    title="Cloudflare Radar - Mobile vs Desktop"
                    loading="lazy"
                    style="border:0;max-width:100%;"
                ></iframe>
                <iframe
                    id="os-iframe"
                    class="cf-radar-embed"
                    width="800"
                    height="447"
                    src=""
                    title="Cloudflare Radar - OS"
                    loading="lazy"
                    style="border:0;max-width:100%;"
                ></iframe>
                <iframe
                    id="browser-iframe"
                    class="cf-radar-embed"
                    width="800"
                    height="447"
                    src=""
                    title="Cloudflare Radar - Browsers"
                    loading="lazy"
                    style="border:0;max-width:100%;"
                ></iframe>
            </div>
        </div>

        <div id="tech-stats">
            <h2>Technical Planning Data</h2>
            <p id="tech-stats-status" class="stat-muted"></p>
            <div id="tech-stats-grid"></div>
        </div>
        
        <div id="top-domains">
            <h2>DNS</h2>
            <table id="domains-table">
                <!-- List of top domains will be added here -->
            </table>
        </div>
    </div>
    <script src="script.js?v=20260226-39"></script>
</body>
</html>
